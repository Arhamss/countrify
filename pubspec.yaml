name: countrify
description: "A beautiful, customizable country picker for Flutter with 250 countries, 5,300+ states, 150,000+ cities, 5 display modes, theming, and 132 translations."
version: 2.4.1
homepage: https://gocodeable.com
repository: https://github.com/Arhamss/countrify
issue_tracker: https://github.com/Arhamss/countrify/issues

topics:
  - country-picker
  - country
  - state
  - city
  - widgets

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  csv: ^6.0.0
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^9.0.0

flutter:
  assets:
    - assets/images/flags/
    - assets/geo/states/
    - assets/geo/cities/
  fonts:
    - family: CountrifyIcons
      fonts:
        - asset: assets/fonts/countrify_icons.ttf
